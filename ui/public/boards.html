<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dira — Boards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { DEFAULT: '#6366f1', dark: '#4f46e5' } } } }
    }
  </script>
</head>
<body class="min-h-screen bg-slate-900 text-white">

  <!-- Navbar -->
  <nav class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex items-center justify-between">
    <h1 class="text-xl font-bold text-white tracking-tight">Dira</h1>
    <div class="flex items-center gap-4">
      <span id="user-name" class="text-slate-400 text-sm"></span>
      <button onclick="logout()" class="text-sm text-slate-400 hover:text-white transition-colors">Sign out</button>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-6 py-10">
    <div class="flex items-center justify-between mb-8">
      <h2 class="text-2xl font-bold">My Boards</h2>
      <button onclick="openCreateModal()"
        class="px-4 py-2 bg-brand hover:bg-brand-dark text-white rounded-lg text-sm font-medium transition-colors">
        + New Board
      </button>
    </div>

    <!-- Board grid -->
    <div id="boards-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- populated by JS -->
    </div>

    <div id="empty-state" class="hidden text-center py-20">
      <p class="text-slate-400 text-lg">No boards yet.</p>
      <p class="text-slate-500 text-sm mt-1">Create your first board to get started.</p>
    </div>
  </main>

  <!-- Create Board Modal -->
  <div id="modal-create" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
    <div class="bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md p-6">
      <h3 class="text-lg font-semibold mb-4">New Board</h3>
      <form onsubmit="submitCreateBoard(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Name</label>
          <input type="text" id="create-name" required
            class="w-full px-4 py-2 rounded-lg bg-slate-700 border border-slate-600 text-white placeholder-slate-400 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand"
            placeholder="e.g. Backend Roadmap" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Description <span class="text-slate-500">(optional)</span></label>
          <textarea id="create-desc" rows="2"
            class="w-full px-4 py-2 rounded-lg bg-slate-700 border border-slate-600 text-white placeholder-slate-400 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand resize-none"
            placeholder="What is this board for?"></textarea>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" onclick="closeCreateModal()"
            class="flex-1 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium transition-colors">
            Cancel
          </button>
          <button type="submit"
            class="flex-1 py-2 rounded-lg bg-brand hover:bg-brand-dark text-white text-sm font-medium transition-colors">
            Create
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/boards.js"></script>
  <script>
    requireAuth();

    async function init() {
      try {
        const me = await fetchMe();
        document.getElementById('user-name').textContent = me.name;
      } catch {}
      await loadBoards();
    }

    async function loadBoards() {
      const grid = document.getElementById('boards-grid');
      const empty = document.getElementById('empty-state');
      try {
        const boards = await fetchBoards();
        if (!boards.length) {
          grid.classList.add('hidden');
          empty.classList.remove('hidden');
          return;
        }
        grid.classList.remove('hidden');
        empty.classList.add('hidden');
        grid.innerHTML = boards.map(b => `
          <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 hover:border-brand transition-colors cursor-pointer group"
               onclick="window.location.href='/board.html?id=${b.id}'">
            <div class="flex items-start justify-between">
              <h3 class="font-semibold text-white group-hover:text-brand transition-colors">${escHtml(b.name)}</h3>
              <button onclick="event.stopPropagation(); confirmDelete('${b.id}', '${escHtml(b.name)}')"
                class="text-slate-600 hover:text-red-400 transition-colors opacity-0 group-hover:opacity-100 text-sm">✕</button>
            </div>
            ${b.description ? `<p class="text-slate-400 text-sm mt-1 line-clamp-2">${escHtml(b.description)}</p>` : ''}
            <p class="text-xs text-slate-500 mt-3">${new Date(b.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</p>
          </div>
        `).join('');
      } catch (err) {
        grid.innerHTML = `<p class="text-red-400 col-span-3">${err.message}</p>`;
      }
    }

    function openCreateModal() {
      document.getElementById('create-name').value = '';
      document.getElementById('create-desc').value = '';
      document.getElementById('modal-create').classList.remove('hidden');
      setTimeout(() => document.getElementById('create-name').focus(), 50);
    }

    function closeCreateModal() {
      document.getElementById('modal-create').classList.add('hidden');
    }

    async function submitCreateBoard(e) {
      e.preventDefault();
      const name = document.getElementById('create-name').value.trim();
      const description = document.getElementById('create-desc').value.trim();
      try {
        await createBoard(name, description || undefined);
        closeCreateModal();
        await loadBoards();
      } catch (err) {
        alert(err.message);
      }
    }

    async function confirmDelete(boardId, boardName) {
      if (!confirm(`Delete "${boardName}"? This cannot be undone.`)) return;
      try {
        await deleteBoard(boardId);
        await loadBoards();
      } catch (err) {
        alert(err.message);
      }
    }

    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Close modal on backdrop click
    document.getElementById('modal-create').addEventListener('click', function(e) {
      if (e.target === this) closeCreateModal();
    });

    init();
  </script>
</body>
</html>
